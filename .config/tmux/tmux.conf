
source-file ~/.config/tmux/options.conf
source-file ~/.config/tmux/keybindings.conf
source-file ~/.config/tmux/plugins.conf

# Overrides that must win over deferred plugin runs (catppuccin/tpm set these
# via run-shell, which executes after config parse — so we queue after them).
# Command prompt / messages: solid bg so they don't bleed into status icons.
run 'tmux set -g message-style "fg=#cdd6f4,bg=#313244" \; set -g message-command-style "fg=#cdd6f4,bg=#313244"'

